  labels:
    app.kubernetes.io/name: configurations.argoproj.io
    app.kubernetes.io/part-of: argocd
  name: configurations.argoproj.io
spec:
  group: argoproj.io
  names:
    kind: Configuration
    listKind: ConfigurationList
    plural: configurations
    shortNames:
    - config
    - configs
    singular: configuration
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Configuration is the Schema for the configurations API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ConfigurationSpec defines the desired state of Configuration.
            properties:
              application:
                description: ApplicationConfig configures application-level settings
                  for reconciliation, sync, RBAC, events, and cluster options.
                properties:
                  events:
                    description: Events configures which metadata.label keys to include
                      or exclude in Kubernetes events generated for Applications.
                    properties:
                      labels:
                        description: Labels configures which metadata.label keys to
                          include or exclude in events.
                        properties:
                          exclude:
                            description: Exclude is a list of metadata.label keys
                              to exclude from events. Supports wildcards.
                            items:
                              type: string
                            type: array
                          include:
                            description: Include is a list of metadata.label keys
                              to include in events. Supports wildcards.
                            items:
                              type: string
                            type: array
                        required:
                        - exclude
                        - include
                        type: object
                    required:
                    - labels
                    type: object
                  inClusterEnabled:
                    default: true
                    description: InClusterEnabled indicates whether to allow in-cluster
                      server address. Enabled by default.
                    type: boolean
                  reconciliation:
                    description: Reconciliation configures the reconciliation timeout
                      and jitter for applications.
                    properties:
                      jitter:
                        description: Jitter is the maximum duration added to the sync
                          timeout to spread out refreshes. Disabled if set to 0.
                        type: string
                      timeout:
                        description: Timeout is the amount of time before ArgoCD tries
                          to discover new manifest versions. Disabled if set to 0.
                        type: string
                    required:
                    - jitter
                    - timeout
                    type: object
                  respectRBAC:
                    default: disabled
                    description: |-
                      RespectRBAC instructs controller to only watch for resources it has permissions to list. Can be "disabled", "normal", or "strict".
                      Disabled by default.
                    enum:
                    - disabled
                    - normal
                    - strict
                    type: string
                  sync:
                    description: Sync configures application sync options, including
                      impersonation.
                    properties:
                      impersonation:
                        description: Impersonation enables application sync to use
                          a custom service account via impersonation.
                        properties:
                          enabled:
                            description: Enabled enables application sync impersonation.
                            type: boolean
                        required:
                        - enabled
                        type: object
                    required:
                    - impersonation
                    type: object
                required:
                - events
                - inClusterEnabled
                - reconciliation
                - respectRBAC
                - sync
                type: object
              globalProjects:
                items:
                  properties:
                    labelSelector:
                      description: |-
                        A label selector is a label query over a set of resources. The result of matchLabels and
                        matchExpressions are ANDed. An empty label selector matches all objects. A null
                        label selector matches no objects.
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: |-
                              A label selector requirement is a selector that contains values, a key, and an operator that
                              relates the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: |-
                                  operator represents a key's relationship to a set of values.
                                  Valid operators are In, NotIn, Exists and DoesNotExist.
                                type: string
                              values:
                                description: |-
                                  values is an array of string values. If the operator is In or NotIn,
                                  the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                  the values array must be empty. This array is replaced during a strategic
                                  merge patch.
                                items:
                                  type: string
                                type: array
                                x-kubernetes-list-type: atomic
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                          x-kubernetes-list-type: atomic
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: |-
                            matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                            map is equivalent to an element of matchExpressions, whose key field is "key", the
                            operator is "In", and the values array contains only "value". The requirements are ANDed.
                          type: object
                      type: object
                      x-kubernetes-map-type: atomic
                    projectName:
                      type: string
                  type: object
                type: array
              installationID:
