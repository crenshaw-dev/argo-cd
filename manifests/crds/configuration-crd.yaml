                                values:
                                  items:
                                    type: string
                                  type: array
                              required:
                              - name
                              type: object
                            type: array
                            x-kubernetes-list-map-keys:
                            - name
                            x-kubernetes-list-type: map
                          requestedScopes:
                            items:
                              type: string
                            type: array
                          rootCA:
                            type: string
                          userInfoCacheExpiration:
                            type: string
                          userInfoPath:
