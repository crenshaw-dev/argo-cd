                              download:
                                items:
                                  properties:
                                    architecture:
                                      enum:
                                      - darwin-amd64
                                      - darwin-arm64
                                      - windows-amd64
                                      - linux-amd64
                                      - linux-arm64
                                      - linux-ppc64le
                                      - linux-s390x
                                      type: string
                                    path:
                                      type: string
                                  required:
                                  - architecture
                                  - path
                                  type: object
                                type: array
                                x-kubernetes-list-map-keys:
                                - architecture
                                x-kubernetes-list-type: map
                              text:
