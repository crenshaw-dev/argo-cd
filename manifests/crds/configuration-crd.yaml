                            or exclusion applies to. If empty, applies to all clusters.
                          items:
                            type: string
                          type: array
                        groups:
                          items:
                            type: string
                          type: array
                        kinds:
                          items:
                            type: string
                          type: array
                      required:
                      - groups
                      - kinds
                      type: object
                    type: array
                  health:
                    description: |-
                      Health defines custom health checks for specific resources. Many health checks are built-in and are not defined
