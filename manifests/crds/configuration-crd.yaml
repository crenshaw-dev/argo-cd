                                url:
                                  description: Url is the target URL for the link.
                                    Supports Go template expressions.
                                  type: string
                              required:
                              - title
                              - url
                              type: object
                            type: array
                          project:
                            description: Project contains deep links for projects.
                            items:
                              description: Link defines a UI deep link, with optional
                                conditional display and icon.
                              properties:
                                description:
                                  description: Description is an optional description
                                    for the link.
                                  type: string
                                iconClass:
                                  description: IconClass is an optional icon CSS class
                                    for the link.
                                  type: string
                                if:
                                  description: If is an optional condition for displaying
                                    the link, using expr-lang expressions.
                                  type: string
                                title:
                                  description: Title is the display text for the link.
                                  type: string
                                url:
                                  description: Url is the target URL for the link.
                                    Supports Go template expressions.
                                  type: string
                              required:
                              - title
                              - url
                              type: object
                            type: array
                          resource:
