                              type: string
                            keepAlive:
                              description: KeepAlive specifies the interval between
                                keep-alive probes for an active connection.
                              type: string
                            maxIdleConnections:
                              description: MaxIdleConnections controls the maximum
                                number of idle connections to the backend.
                              format: int64
                              type: integer
                            services:
                              description: Services lists the backend service URLs
                                and cluster mappings.
                              items:
                                description: Service defines a backend service URL
                                  and optional cluster mapping for extension routing.
                                properties:
                                  cluster:
                                    description: Cluster maps the service to a specific
                                      cluster destination.
                                    properties:
                                      name:
                                        description: Name is the cluster name for
                                          service routing.
                                        type: string
                                      server:
                                        description: Server is the cluster server
                                          address for service routing.
                                        type: string
                                    required:
                                    - name
                                    - server
                                    type: object
                                  url:
                                    description: Url is the address where the extension
                                      backend service is available.
                                    type: string
                                required:
                                - cluster
                                - url
                                type: object
                              type: array
                          required:
                          - connectionTimeout
                          - idleConnectionTimeout
                          - keepAlive
                          - maxIdleConnections
                          - services
                          type: object
                        name:
