                              properties:
                                group:
                                  type: string
                                jqPathExpressions:
                                  items:
                                    type: string
                                  type: array
                                jsonPointers:
                                  items:
                                    type: string
                                  type: array
                                kind:
                                  type: string
                                managedFieldsManagers:
                                  items:
                                    type: string
                                  type: array
                              required:
