                        items:
                          type: string
                        type: array
                    required:
                    - enabled
                    - valuesFileSchemes
                    type: object
                  jsonnet:
                    properties:
                      enabled:
                        default: true
                        type: boolean
                    required:
                    - enabled
                    type: object
                  kustomize:
